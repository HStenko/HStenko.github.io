<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Portfolio — Herman Stenko</title>
<meta name="description" content="Portfolio booklet.">
<style>
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    background:#ffffff;
    color:#111;
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    display:flex; flex-direction:column;
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }

  /* ── tiny header ───────────────────────────────────────── */
  header{
    flex:0 0 auto;
    display:flex; justify-content:space-between; align-items:baseline;
    padding:18px clamp(18px,4vw,40px) 4px;
  }
  header .name{ font-size:14px; letter-spacing:.12em; text-transform:uppercase; font-weight:500; cursor:pointer; user-select:none; }
  header .tag{ font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:#9a9a9a; }
  header .tag-link{ font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:#9a9a9a; text-decoration:none; }
  header .tag-link:hover{ color:#555; }
  header .right{ display:flex; align-items:baseline; gap:14px; }
  :fullscreen header{ display:none; }
  :-webkit-full-screen header{ display:none; }

  /* ── the page stage ────────────────────────────────────── */
  .stage{
    flex:1 1 auto;
    display:flex; align-items:center; justify-content:center;
    padding:clamp(10px,2.5vh,26px) clamp(14px,4vw,48px);
    position:relative; min-height:0;
  }
  .page{
    transition:opacity .28s ease;
    line-height:0;
    box-shadow:0 10px 40px -12px rgba(0,0,0,.28), 0 1px 2px rgba(0,0,0,.06);
    background:#fff;
  }
  canvas{ display:block; max-width:100%; max-height:100%; }

  /* loading / empty states */
  .msg{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    text-align:center; padding:30px;
  }
  .msg p{ font-size:13px; letter-spacing:.04em; color:#9a9a9a; line-height:1.7; max-width:340px; }
  .msg.hidden{ display:none; }

  /* invisible tap zones */
  .tapzone{ position:absolute; top:0; bottom:0; width:35%; cursor:pointer; z-index:5; }
  .tapzone.prev{ left:0; }
  .tapzone.next{ right:0; width:65%; }

  /* ── controls ──────────────────────────────────────────── */
  .controls{
    flex:0 0 auto;
    display:flex; align-items:center; justify-content:center; gap:20px;
    padding:10px 16px clamp(16px,3vh,26px);
  }
  .nav{
    appearance:none; background:none; border:none; cursor:pointer; color:#111;
    width:40px; height:40px; border-radius:50%;
    display:grid; place-items:center; transition:background .2s ease, opacity .2s ease;
  }
  .nav:hover{ background:#f2f2f2; }
  .nav:disabled{ opacity:.2; cursor:default; }
  .nav svg{ width:16px; height:16px; }
  .nav:focus-visible{ outline:2px solid #111; outline-offset:3px; }
  .folio{ font-size:12px; letter-spacing:.18em; color:#666; min-width:70px; text-align:center; font-variant-numeric:tabular-nums; }
  .fs-btn{ background:none; border:none; cursor:pointer; color:#9a9a9a; font-size:16px; line-height:1; padding:6px; }
  .fs-btn:hover{ color:#555; }

  /* ── modal popup ───────────────────────────────────────── */
  .modal-backdrop{
    position:fixed; inset:0; background:rgba(0,0,0,.35);
    display:none; align-items:center; justify-content:center;
    z-index:50; padding:20px;
  }
  .modal-backdrop.open{ display:flex; }
  .modal{
    background:#fff; padding:28px 30px; max-width:360px; width:100%;
    box-shadow:0 20px 60px -16px rgba(0,0,0,.35), 0 2px 6px rgba(0,0,0,.08);
    position:relative;
  }
  .modal-title{ font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:#9a9a9a; margin-bottom:14px; }
  .modal-row{ display:flex; align-items:center; gap:10px; margin-bottom:8px; }
  .modal-label{ font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#9a9a9a; min-width:60px; }
  .modal-value{ font-size:14px; color:#111; font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; flex:1; word-break:break-all; }
  .modal-copy{
    appearance:none; background:none; border:1px solid #ddd; cursor:pointer;
    font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:#666;
    padding:6px 10px; transition:border-color .2s, color .2s;
  }
  .modal-copy:hover{ border-color:#111; color:#111; }
  .modal-copy.copied{ border-color:#111; color:#111; }
  .modal-foot{ margin-top:18px; font-size:11px; letter-spacing:.08em; color:#9a9a9a; }
  .modal-foot a{ color:#666; text-decoration:none; border-bottom:1px solid #ddd; }
  .modal-foot a:hover{ color:#111; border-color:#111; }
  .modal-close{
    position:absolute; top:10px; right:12px; background:none; border:none; cursor:pointer;
    font-size:18px; line-height:1; color:#9a9a9a; padding:4px;
  }
  .modal-close:hover{ color:#111; }

  @media (prefers-reduced-motion: reduce){ .page{ transition:none; } }
</style>
</head>
<body>

  <header>
    <span class="name" id="nameReset">Herman Stenko</span>
    <div class="right">
      <span class="tag">Portfolio</span>
      <a class="tag-link" href="#" id="cvLink">Request CV</a>
      <a class="tag-link" href="#" id="contactLink">Contact</a>
    </div>
  </header>

  <main class="stage">
    <div class="page" id="page"><canvas id="canvas"></canvas></div>
    <div class="msg" id="msg"><p>Loading portfolio…</p></div>
    <div class="tapzone prev" id="zonePrev" aria-hidden="true"></div>
    <div class="tapzone next" id="zoneNext" aria-hidden="true"></div>
  </main>

  <nav class="controls" aria-label="Page navigation">
    <button class="nav" id="prev" aria-label="Previous page">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15 5l-7 7 7 7"/></svg>
    </button>
    <div class="folio" id="folio">—</div>
    <button class="nav" id="next" aria-label="Next page">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5l7 7-7 7"/></svg>
    </button>
    <button class="fs-btn" id="fsBtn" title="Toggle fullscreen" aria-label="Toggle fullscreen">⤢</button>
  </nav>

  <div class="modal-backdrop" id="modal" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button class="modal-close" id="modalClose" aria-label="Close">×</button>
      <div class="modal-title" id="modalTitle">Contact</div>
      <div class="modal-row" id="subjectRow" hidden>
        <span class="modal-label">Subject</span>
        <span class="modal-value" id="modalSubject">CV request</span>
        <button class="modal-copy" data-copy="subject">Copy</button>
      </div>
      <div class="modal-row">
        <span class="modal-label">Email</span>
        <span class="modal-value" id="modalEmail">herman140920@gmail.com</span>
        <button class="modal-copy" data-copy="email">Copy</button>
      </div>
      <div class="modal-foot">or <a href="#" id="modalMailto">open in your mail app</a></div>
    </div>
  </div>

  <!-- PDF rendering engine (loaded free from a public CDN) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    /* ════════════════════════════════════════════════════════
       Put your portfolio file in this folder named exactly
       portfolio.pdf  — or change the name on the next line.
       ════════════════════════════════════════════════════════ */
    const PDF_URL = "portfolio.pdf";

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    const canvas = document.getElementById("canvas");
    const ctx    = canvas.getContext("2d");
    const stage  = document.querySelector(".stage");
    const pageEl = document.getElementById("page");
    const msg    = document.getElementById("msg");
    const folio  = document.getElementById("folio");
    const prevBtn= document.getElementById("prev");
    const nextBtn= document.getElementById("next");

    let pdfDoc = null, current = 1, total = 0, rendering = false, queued = null;

    pdfjsLib.getDocument(PDF_URL).promise
      .then(doc => { pdfDoc = doc; total = doc.numPages; msg.classList.add("hidden"); render(1); })
      .catch(() => {
        msg.classList.remove("hidden");
        msg.innerHTML = "<p>Add your portfolio file to this folder, named <b>portfolio.pdf</b>, and it will appear here as a booklet.</p>";
      });

    async function render(n){
      if(!pdfDoc) return;
      if(rendering){ queued = n; return; }
      rendering = true;
      pageEl.style.opacity = 0;

      const page = await pdfDoc.getPage(n);
      const dpr  = window.devicePixelRatio || 1;
      const base = page.getViewport({ scale: 1 });
      const maxW = stage.clientWidth  - 4;
      const maxH = stage.clientHeight - 4;
      const fit  = Math.min(maxW / base.width, maxH / base.height);
      const vp   = page.getViewport({ scale: fit * dpr });

      canvas.width  = Math.floor(vp.width);
      canvas.height = Math.floor(vp.height);
      canvas.style.width  = Math.floor(vp.width  / dpr) + "px";
      canvas.style.height = Math.floor(vp.height / dpr) + "px";

      await page.render({ canvasContext: ctx, viewport: vp }).promise;

      current = n;
      folio.textContent = current + " / " + total;
      prevBtn.disabled = current <= 1;
      nextBtn.disabled = current >= total;
      pageEl.style.opacity = 1;

      rendering = false;
      if(queued !== null){ const q = queued; queued = null; render(q); }
    }

    function go(d){
      const t = current + d;
      if(t >= 1 && t <= total) render(t);
    }

    nextBtn.addEventListener("click", ()=>go(1));
    prevBtn.addEventListener("click", ()=>go(-1));
    document.getElementById("zoneNext").addEventListener("click", ()=>go(1));
    document.getElementById("zonePrev").addEventListener("click", ()=>go(-1));
    document.addEventListener("keydown", e=>{
      if(e.key==="ArrowRight"||e.key==="PageDown") go(1);
      if(e.key==="ArrowLeft" ||e.key==="PageUp")   go(-1);
    });

    let tx=null;
    document.addEventListener("touchstart", e=>{ tx=e.changedTouches[0].clientX; }, {passive:true});
    document.addEventListener("touchend", e=>{
      if(tx===null) return;
      const dx=e.changedTouches[0].clientX - tx;
      if(Math.abs(dx)>45) go(dx<0?1:-1);
      tx=null;
    }, {passive:true});

    let rz; window.addEventListener("resize", ()=>{
      clearTimeout(rz); rz=setTimeout(()=>{ if(pdfDoc) render(current); }, 160);
    });

    document.getElementById("nameReset").addEventListener("click", ()=>{ if(pdfDoc) render(1); });

    const fsBtn = document.getElementById("fsBtn");
    fsBtn.addEventListener("click", ()=>{
      if(!document.fullscreenElement) document.documentElement.requestFullscreen();
      else document.exitFullscreen();
    });
    document.addEventListener("fullscreenchange", ()=>{
      fsBtn.textContent = document.fullscreenElement ? "⤡" : "⤢";
    });

    const modal = document.getElementById("modal");
    const modalTitle = document.getElementById("modalTitle");
    const subjectRow = document.getElementById("subjectRow");
    const modalMailto = document.getElementById("modalMailto");
    const EMAIL = "herman140920@gmail.com";
    const CV_SUBJECT = "CV request";

    function openModal(kind){
      if(kind === "cv"){
        modalTitle.textContent = "Request CV";
        subjectRow.hidden = false;
        modalMailto.href = "mailto:" + EMAIL + "?subject=" + encodeURIComponent(CV_SUBJECT);
      } else {
        modalTitle.textContent = "Contact";
        subjectRow.hidden = true;
        modalMailto.href = "mailto:" + EMAIL;
      }
      modal.querySelectorAll(".modal-copy").forEach(b=>{ b.textContent = "Copy"; b.classList.remove("copied"); });
      modal.classList.add("open");
      modal.setAttribute("aria-hidden","false");
    }
    function closeModal(){
      modal.classList.remove("open");
      modal.setAttribute("aria-hidden","true");
    }

    document.getElementById("cvLink").addEventListener("click", e=>{ e.preventDefault(); openModal("cv"); });
    document.getElementById("contactLink").addEventListener("click", e=>{ e.preventDefault(); openModal("contact"); });
    document.getElementById("modalClose").addEventListener("click", closeModal);
    modal.addEventListener("click", e=>{ if(e.target === modal) closeModal(); });
    document.addEventListener("keydown", e=>{ if(e.key === "Escape" && modal.classList.contains("open")) closeModal(); });

    modal.querySelectorAll(".modal-copy").forEach(btn=>{
      btn.addEventListener("click", async ()=>{
        const text = btn.dataset.copy === "subject" ? CV_SUBJECT : EMAIL;
        try { await navigator.clipboard.writeText(text); }
        catch { const ta=document.createElement("textarea"); ta.value=text; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); ta.remove(); }
        btn.textContent = "Copied!";
        btn.classList.add("copied");
        setTimeout(()=>{ btn.textContent = "Copy"; btn.classList.remove("copied"); }, 1600);
      });
    });
  </script>
</body>
</html>
