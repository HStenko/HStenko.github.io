<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Portfolio — Herman Stenko</title>
<meta name="description" content="Portfolio booklet.">
<style>
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    background:#ffffff;
    color:#111;
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    display:flex; flex-direction:column;
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }

  /* ── tiny header ───────────────────────────────────────── */
  header{
    flex:0 0 auto;
    display:flex; justify-content:space-between; align-items:baseline;
    padding:18px clamp(18px,4vw,40px) 4px;
  }
  header .name{ font-size:14px; letter-spacing:.12em; text-transform:uppercase; font-weight:500; cursor:pointer; user-select:none; }
  header .tag{ font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:#9a9a9a; }
  header .tag-link{ font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:#9a9a9a; text-decoration:none; }
  header .tag-link:hover{ color:#555; }
  header .fs-btn{ background:none; border:none; cursor:pointer; color:#9a9a9a; font-size:16px; line-height:1; padding:0 0 0 10px; vertical-align:middle; }
  header .fs-btn:hover{ color:#555; }
  header .right{ display:flex; align-items:baseline; gap:14px; }

  /* ── the page stage ────────────────────────────────────── */
  .stage{
    flex:1 1 auto;
    display:flex; align-items:center; justify-content:center;
    padding:clamp(10px,2.5vh,26px) clamp(14px,4vw,48px);
    position:relative; min-height:0;
  }
  .page{
    transition:opacity .28s ease;
    line-height:0;
    box-shadow:0 10px 40px -12px rgba(0,0,0,.28), 0 1px 2px rgba(0,0,0,.06);
    background:#fff;
  }
  canvas{ display:block; max-width:100%; max-height:100%; }

  /* loading / empty states */
  .msg{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    text-align:center; padding:30px;
  }
  .msg p{ font-size:13px; letter-spacing:.04em; color:#9a9a9a; line-height:1.7; max-width:340px; }
  .msg.hidden{ display:none; }

  /* invisible tap zones */
  .tapzone{ position:absolute; top:0; bottom:0; width:35%; cursor:pointer; z-index:5; }
  .tapzone.prev{ left:0; }
  .tapzone.next{ right:0; width:65%; }

  /* ── controls ──────────────────────────────────────────── */
  .controls{
    flex:0 0 auto;
    display:flex; align-items:center; justify-content:center; gap:20px;
    padding:10px 16px clamp(16px,3vh,26px);
  }
  .nav{
    appearance:none; background:none; border:none; cursor:pointer; color:#111;
    width:40px; height:40px; border-radius:50%;
    display:grid; place-items:center; transition:background .2s ease, opacity .2s ease;
  }
  .nav:hover{ background:#f2f2f2; }
  .nav:disabled{ opacity:.2; cursor:default; }
  .nav svg{ width:16px; height:16px; }
  .nav:focus-visible{ outline:2px solid #111; outline-offset:3px; }
  .folio{ font-size:12px; letter-spacing:.18em; color:#666; min-width:70px; text-align:center; font-variant-numeric:tabular-nums; }

  @media (prefers-reduced-motion: reduce){ .page{ transition:none; } }
</style>
</head>
<body>

  <header>
    <span class="name" id="nameReset">Herman Stenko</span>
    <div class="right">
      <span class="tag">Portfolio</span>
      <a class="tag-link" href="cv.pdf" target="_blank">CV</a>
      <a class="tag-link" href="mailto:herman140920@gmail.com">Contact</a>
      <button class="fs-btn" id="fsBtn" title="Toggle fullscreen" aria-label="Toggle fullscreen">⤢</button>
    </div>
  </header>

  <main class="stage">
    <div class="page" id="page"><canvas id="canvas"></canvas></div>
    <div class="msg" id="msg"><p>Loading portfolio…</p></div>
    <div class="tapzone prev" id="zonePrev" aria-hidden="true"></div>
    <div class="tapzone next" id="zoneNext" aria-hidden="true"></div>
  </main>

  <nav class="controls" aria-label="Page navigation">
    <button class="nav" id="prev" aria-label="Previous page">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15 5l-7 7 7 7"/></svg>
    </button>
    <div class="folio" id="folio">—</div>
    <button class="nav" id="next" aria-label="Next page">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5l7 7-7 7"/></svg>
    </button>
  </nav>

  <!-- PDF rendering engine (loaded free from a public CDN) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    /* ════════════════════════════════════════════════════════
       Put your portfolio file in this folder named exactly
       portfolio.pdf  — or change the name on the next line.
       ════════════════════════════════════════════════════════ */
    const PDF_URL = "portfolio.pdf";

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    const canvas = document.getElementById("canvas");
    const ctx    = canvas.getContext("2d");
    const stage  = document.querySelector(".stage");
    const pageEl = document.getElementById("page");
    const msg    = document.getElementById("msg");
    const folio  = document.getElementById("folio");
    const prevBtn= document.getElementById("prev");
    const nextBtn= document.getElementById("next");

    let pdfDoc = null, current = 1, total = 0, rendering = false, queued = null;

    pdfjsLib.getDocument(PDF_URL).promise
      .then(doc => { pdfDoc = doc; total = doc.numPages; msg.classList.add("hidden"); render(1); })
      .catch(() => {
        msg.classList.remove("hidden");
        msg.innerHTML = "<p>Add your portfolio file to this folder, named <b>portfolio.pdf</b>, and it will appear here as a booklet.</p>";
      });

    async function render(n){
      if(!pdfDoc) return;
      if(rendering){ queued = n; return; }
      rendering = true;
      pageEl.style.opacity = 0;

      const page = await pdfDoc.getPage(n);
      const dpr  = window.devicePixelRatio || 1;
      const base = page.getViewport({ scale: 1 });
      const maxW = stage.clientWidth  - 4;
      const maxH = stage.clientHeight - 4;
      const fit  = Math.min(maxW / base.width, maxH / base.height);
      const vp   = page.getViewport({ scale: fit * dpr });

      canvas.width  = Math.floor(vp.width);
      canvas.height = Math.floor(vp.height);
      canvas.style.width  = Math.floor(vp.width  / dpr) + "px";
      canvas.style.height = Math.floor(vp.height / dpr) + "px";

      await page.render({ canvasContext: ctx, viewport: vp }).promise;

      current = n;
      folio.textContent = current + " / " + total;
      prevBtn.disabled = current <= 1;
      nextBtn.disabled = current >= total;
      pageEl.style.opacity = 1;

      rendering = false;
      if(queued !== null){ const q = queued; queued = null; render(q); }
    }

    function go(d){
      const t = current + d;
      if(t >= 1 && t <= total) render(t);
    }

    nextBtn.addEventListener("click", ()=>go(1));
    prevBtn.addEventListener("click", ()=>go(-1));
    document.getElementById("zoneNext").addEventListener("click", ()=>go(1));
    document.getElementById("zonePrev").addEventListener("click", ()=>go(-1));
    document.addEventListener("keydown", e=>{
      if(e.key==="ArrowRight"||e.key==="PageDown") go(1);
      if(e.key==="ArrowLeft" ||e.key==="PageUp")   go(-1);
    });

    let tx=null;
    document.addEventListener("touchstart", e=>{ tx=e.changedTouches[0].clientX; }, {passive:true});
    document.addEventListener("touchend", e=>{
      if(tx===null) return;
      const dx=e.changedTouches[0].clientX - tx;
      if(Math.abs(dx)>45) go(dx<0?1:-1);
      tx=null;
    }, {passive:true});

    let rz; window.addEventListener("resize", ()=>{
      clearTimeout(rz); rz=setTimeout(()=>{ if(pdfDoc) render(current); }, 160);
    });

    document.getElementById("nameReset").addEventListener("click", ()=>{ if(pdfDoc) render(1); });

    const fsBtn = document.getElementById("fsBtn");
    fsBtn.addEventListener("click", ()=>{
      if(!document.fullscreenElement) document.documentElement.requestFullscreen();
      else document.exitFullscreen();
    });
    document.addEventListener("fullscreenchange", ()=>{
      fsBtn.textContent = document.fullscreenElement ? "⤡" : "⤢";
    });
  </script>
</body>
</html>
