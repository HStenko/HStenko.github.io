<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Portfolio — Herman Stenko</title>
<meta name="description" content="Portfolio booklet.">
<style>
  *{ box-sizing:border-box; margin:0; padding:0; }
  button, input, select, textarea{ font:inherit; color:inherit; }
  html,body{ height:100%; }
  body{
    background:#ffffff;
    color:#111;
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    display:flex; flex-direction:column;
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }

  /* ── tiny header ───────────────────────────────────────── */
  header{
    flex:0 0 auto;
    display:flex; justify-content:space-between; align-items:center;
    padding:18px clamp(20px,4vw,40px) 12px;
  }
  header .name{ font-size:14px; letter-spacing:.12em; text-transform:uppercase; font-weight:500; cursor:pointer; user-select:none; }
  header .tag{ font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:#9a9a9a; }
  header .tag-link{ font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:#9a9a9a; text-decoration:none; }
  header .tag-link:hover{ color:#555; }
  header .right{ display:flex; align-items:center; gap:20px; line-height:1; }
  header .name{ line-height:1; }
  :fullscreen header .name{ visibility:hidden; }
  :-webkit-full-screen header .name{ visibility:hidden; }
  :fullscreen header{ padding-top: clamp(14px,2.5vh,24px); padding-bottom: clamp(14px,2.5vh,24px); }
  :-webkit-full-screen header{ padding-top: clamp(14px,2.5vh,24px); padding-bottom: clamp(14px,2.5vh,24px); }
  :fullscreen .controls{ padding-top: clamp(14px,2.5vh,24px); padding-bottom: clamp(14px,2.5vh,24px); }
  :-webkit-full-screen .controls{ padding-top: clamp(14px,2.5vh,24px); padding-bottom: clamp(14px,2.5vh,24px); }

  /* ── the page stage ────────────────────────────────────── */
  .stage{
    flex:1 1 auto;
    display:flex; align-items:center; justify-content:center;
    padding:clamp(10px,2.5vh,26px) clamp(14px,4vw,48px);
    position:relative; min-height:0;
  }
  .page{
    transition:opacity .28s ease;
    line-height:0;
    box-shadow:0 10px 40px -12px rgba(0,0,0,.28), 0 1px 2px rgba(0,0,0,.06);
    background:#fff;
  }
  .page img{
    display:block;
    width:auto; height:auto;
    max-width:100%; max-height:85vh;
    object-fit:contain;
  }
  .page picture{ display:block; line-height:0; }

  /* loading / empty states */
  .msg{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    text-align:center; padding:30px;
  }
  .msg p{ font-size:13px; letter-spacing:.04em; color:#9a9a9a; line-height:1.7; max-width:340px; }
  .msg.hidden{ display:none; }
  .spinner{
    width:28px; height:28px; border-radius:50%;
    border:2px solid #e5e5e5; border-top-color:#9a9a9a;
    animation:spin .8s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  @media (prefers-reduced-motion: reduce){ .spinner{ animation:none; } }

  /* invisible tap zones */
  .tapzone{ position:absolute; top:0; bottom:0; width:35%; cursor:pointer; z-index:5; }
  .tapzone.prev{ left:0; }
  .tapzone.next{ right:0; width:65%; }

  /* ── controls ──────────────────────────────────────────── */
  .controls{
    flex:0 0 auto; position:relative;
    display:flex; align-items:center; justify-content:center; gap:20px;
    padding:10px 16px clamp(16px,3vh,26px);
  }
  .controls .spacer{ width:40px; height:40px; visibility:hidden; }
  .nav{
    appearance:none; background:none; border:none; cursor:pointer; color:#111;
    width:40px; height:40px; border-radius:50%;
    display:grid; place-items:center; transition:background .2s ease, opacity .2s ease;
  }
  .nav:hover{ background:#f2f2f2; }
  .nav:disabled{ opacity:.2; cursor:default; }
  .nav svg{ width:16px; height:16px; }
  .nav:focus-visible{ outline:2px solid #111; outline-offset:3px; }
  .folio{ font-size:12px; letter-spacing:.18em; color:#666; min-width:70px; text-align:center; font-variant-numeric:tabular-nums; }

  /* ── modal popup ───────────────────────────────────────── */
  .modal-backdrop{
    position:fixed; inset:0; background:rgba(0,0,0,.35);
    display:none; align-items:center; justify-content:center;
    z-index:50; padding:20px;
  }
  .modal-backdrop.open{ display:flex; }
  .modal{
    background:#fff; padding:28px 30px; max-width:440px; width:100%;
    box-shadow:0 20px 60px -16px rgba(0,0,0,.35), 0 2px 6px rgba(0,0,0,.08);
    position:relative;
  }
  .modal-title{ font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:#9a9a9a; margin-bottom:14px; }
  .modal-row{ display:flex; align-items:center; gap:10px; margin-bottom:8px; }
  .modal-label{ font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#9a9a9a; min-width:60px; }
  .modal-value{ font-size:14px; color:#111; flex:1; white-space:nowrap; }
  .modal-value a{ color:#111; text-decoration:none; border-bottom:1px solid #ddd; }
  .modal-value a:hover{ border-color:#111; }
  .modal-copy{
    appearance:none; background:none; border:1px solid #ddd; cursor:pointer;
    font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:#666;
    padding:6px 10px; transition:border-color .2s, color .2s;
  }
  .modal-copy:hover{ border-color:#111; color:#111; }
  .modal-copy.copied{ border-color:#111; color:#111; }
  .modal-foot{ margin-top:18px; font-size:11px; letter-spacing:.08em; color:#9a9a9a; }
  .modal-foot a{ color:#666; text-decoration:none; border-bottom:1px solid #ddd; }
  .modal-foot a:hover{ color:#111; border-color:#111; }
  .modal-close{
    position:absolute; top:10px; right:12px; background:none; border:none; cursor:pointer;
    font-size:18px; line-height:1; color:#9a9a9a; padding:4px;
  }
  .modal-close:hover{ color:#111; }

  @media (prefers-reduced-motion: reduce){ .page{ transition:none; } }

  /* ── mobile header: stack name above links ─────────────── */
  @media (max-width: 600px){
    header{
      flex-direction:column; align-items:center; row-gap:18px;
      padding:14px 12px 12px;
    }
    header .name{ font-size:12px; letter-spacing:.1em; }
    header .right{
      flex-wrap:wrap; justify-content:center;
      gap:4px 6px; max-width:100%;
    }
    header .tag-link{
      font-size:9px; letter-spacing:.1em;
      padding:8px 6px; line-height:1; white-space:nowrap;
    }
  }

  /* ── mobile fullscreen fallback (no real FS API) ───────── */
  body.fs-fallback{ overflow:hidden; }
  body.fs-fallback header{ display:none; }
  body.fs-fallback .stage{
    position:fixed; inset:0; padding:8px;
    background:#fff; z-index:40;
  }
  body.fs-fallback .controls{
    position:fixed; left:0; right:0; bottom:0;
    background:rgba(255,255,255,.94);
    padding:10px 16px calc(env(safe-area-inset-bottom, 0px) + 14px);
    z-index:41;
  }
</style>
</head>
<body>

  <header>
    <span class="name" id="nameReset">Herman Stenko</span>
    <div class="right">
      <a class="tag-link" href="#" id="portfolioLink">Portfolio</a>
      <a class="tag-link" href="/about">About</a>
      <a class="tag-link" href="#" id="cvLink">Request CV</a>
      <a class="tag-link" href="#" id="contactLink">Contact</a>
    </div>
  </header>

  <main class="stage">
    <div class="page" id="page">
      <picture>
        <source id="srcAvif" type="image/avif">
        <source id="srcWebp" type="image/webp">
        <img id="pageImg" alt="">
      </picture>
    </div>
    <div class="msg" id="msg"><div class="spinner" aria-label="Loading" role="status"></div></div>
    <div class="tapzone prev" id="zonePrev" aria-hidden="true"></div>
    <div class="tapzone next" id="zoneNext" aria-hidden="true"></div>
  </main>

  <nav class="controls" aria-label="Page navigation">
    <div class="spacer" aria-hidden="true"></div>
    <button class="nav" id="prev" aria-label="Previous page">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15 5l-7 7 7 7"/></svg>
    </button>
    <div class="folio" id="folio">—</div>
    <button class="nav" id="next" aria-label="Next page">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5l7 7-7 7"/></svg>
    </button>
    <button class="nav" id="fsBtn" title="Toggle fullscreen" aria-label="Toggle fullscreen">
      <svg id="fsIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/></svg>
    </button>
  </nav>

  <div class="modal-backdrop" id="cvModal" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="cvModalTitle">
      <button class="modal-close" data-close="cvModal" aria-label="Close">×</button>
      <div class="modal-title" id="cvModalTitle">Request CV</div>
      <div class="modal-row">
        <span class="modal-label">Subject</span>
        <span class="modal-value">CV request</span>
        <button class="modal-copy" data-copy-text="CV request">Copy</button>
      </div>
      <div class="modal-row">
        <span class="modal-label">Email</span>
        <span class="modal-value">herman140920@gmail.com</span>
        <button class="modal-copy" data-copy-text="herman140920@gmail.com">Copy</button>
      </div>
      <div class="modal-foot">or <a href="mailto:herman140920@gmail.com?subject=CV%20request">open in your mail app</a></div>
    </div>
  </div>

  <div class="modal-backdrop" id="contactModal" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="contactModalTitle">
      <button class="modal-close" data-close="contactModal" aria-label="Close">×</button>
      <div class="modal-title" id="contactModalTitle">Contact</div>
      <div class="modal-row">
        <span class="modal-label">Email</span>
        <span class="modal-value">herman140920@gmail.com</span>
        <button class="modal-copy" data-copy-text="herman140920@gmail.com">Copy</button>
      </div>
      <div class="modal-row">
        <span class="modal-label">Instagram</span>
        <span class="modal-value"><a href="https://www.instagram.com/h.stenko/" target="_blank" rel="noopener">@h.stenko</a></span>
      </div>
      <!-- LinkedIn row goes here when ready -->
    </div>
  </div>

  <script>
    const TOTAL = 28;
    const isMobile = window.matchMedia('(max-width: 600px)').matches;
    const VARIANT = isMobile ? 'mobile' : 'desktop';

    const pageEl  = document.getElementById("page");
    const srcAvif = document.getElementById("srcAvif");
    const srcWebp = document.getElementById("srcWebp");
    const pageImg = document.getElementById("pageImg");
    const msg     = document.getElementById("msg");
    const folio   = document.getElementById("folio");
    const prevBtn = document.getElementById("prev");
    const nextBtn = document.getElementById("next");

    let current = 1;

    function paths(n){
      const nn = String(n).padStart(2, '0');
      return {
        avif: `images/page-${nn}-${VARIANT}.avif`,
        webp: `images/page-${nn}-${VARIANT}.webp`,
      };
    }

    function render(n){
      if(n < 1 || n > TOTAL) return;
      const p = paths(n);
      msg.classList.remove("hidden");
      msg.innerHTML = '<div class="spinner" aria-label="Loading" role="status"></div>';
      pageEl.style.opacity = 0;

      srcAvif.srcset = p.avif;
      srcWebp.srcset = p.webp;
      pageImg.src    = p.webp;

      current = n;
      folio.textContent = current + " / " + TOTAL;
      prevBtn.disabled = current <= 1;
      nextBtn.disabled = current >= TOTAL;
    }

    pageImg.addEventListener("load", ()=>{
      msg.classList.add("hidden");
      pageEl.style.opacity = 1;
      if(current < TOTAL){
        const next = paths(current + 1);
        new Image().src = next.webp;
        new Image().src = next.avif;
      }
    });
    pageImg.addEventListener("error", ()=>{
      msg.classList.remove("hidden");
      msg.innerHTML = "<p>Couldn't load page " + current + ".</p>";
    });

    render(1);

    function go(d){
      const t = current + d;
      if(t >= 1 && t <= TOTAL) render(t);
    }

    nextBtn.addEventListener("click", ()=>go(1));
    prevBtn.addEventListener("click", ()=>go(-1));
    document.getElementById("zoneNext").addEventListener("click", ()=>go(1));
    document.getElementById("zonePrev").addEventListener("click", ()=>go(-1));
    document.addEventListener("keydown", e=>{
      if(e.key==="ArrowRight"||e.key==="PageDown") go(1);
      if(e.key==="ArrowLeft" ||e.key==="PageUp")   go(-1);
    });

    let tx=null;
    document.addEventListener("touchstart", e=>{ tx=e.changedTouches[0].clientX; }, {passive:true});
    document.addEventListener("touchend", e=>{
      if(tx===null) return;
      const dx=e.changedTouches[0].clientX - tx;
      if(Math.abs(dx)>45) go(dx<0?1:-1);
      tx=null;
    }, {passive:true});

    document.getElementById("nameReset").addEventListener("click", ()=>render(1));
    document.getElementById("portfolioLink").addEventListener("click", e=>{ e.preventDefault(); render(1); });

    const fsBtn = document.getElementById("fsBtn");
    const fsIcon = document.getElementById("fsIcon");
    const FS_EXPAND = '<path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/>';
    const FS_COLLAPSE = '<path d="M9 4v5H4M15 4v5h5M9 20v-5H4M15 20v-5h5"/>';
    const realFsSupported = !!(document.fullscreenEnabled && document.documentElement.requestFullscreen);
    fsBtn.addEventListener("click", ()=>{
      if(realFsSupported){
        if(!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
      } else {
        const on = document.body.classList.toggle("fs-fallback");
        fsIcon.innerHTML = on ? FS_COLLAPSE : FS_EXPAND;
      }
    });
    document.addEventListener("fullscreenchange", ()=>{
      fsIcon.innerHTML = document.fullscreenElement ? FS_COLLAPSE : FS_EXPAND;
    });

    function openModal(id){
      const m = document.getElementById(id);
      m.querySelectorAll(".modal-copy").forEach(b=>{ b.textContent = "Copy"; b.classList.remove("copied"); });
      m.classList.add("open");
      m.setAttribute("aria-hidden","false");
    }
    function closeModal(m){ m.classList.remove("open"); m.setAttribute("aria-hidden","true"); }

    document.getElementById("cvLink").addEventListener("click", e=>{ e.preventDefault(); openModal("cvModal"); });
    document.getElementById("contactLink").addEventListener("click", e=>{ e.preventDefault(); openModal("contactModal"); });

    document.querySelectorAll(".modal-backdrop").forEach(m=>{
      m.addEventListener("click", e=>{ if(e.target === m) closeModal(m); });
    });
    document.querySelectorAll("[data-close]").forEach(btn=>{
      btn.addEventListener("click", ()=> closeModal(document.getElementById(btn.dataset.close)));
    });
    document.addEventListener("keydown", e=>{
      if(e.key !== "Escape") return;
      document.querySelectorAll(".modal-backdrop.open").forEach(closeModal);
    });

    document.querySelectorAll(".modal-copy").forEach(btn=>{
      btn.addEventListener("click", async ()=>{
        const text = btn.dataset.copyText;
        try { await navigator.clipboard.writeText(text); }
        catch { const ta=document.createElement("textarea"); ta.value=text; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); ta.remove(); }
        btn.textContent = "Copied!";
        btn.classList.add("copied");
        setTimeout(()=>{ btn.textContent = "Copy"; btn.classList.remove("copied"); }, 1600);
      });
    });
  </script>
</body>
</html>
